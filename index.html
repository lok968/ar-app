<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR产品展示 - 扫瓶子出现3D人物</title>
    <style>
        body { margin:0; overflow:hidden; font-family: system-ui; }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ffaa00;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://docs.opencv.org/4.10.0/opencv.js" onload="window.onOpenCvReady()"></script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ---------- 配置 ----------
        const REF_IMAGE_URL = './logo.jpg';
        const MODEL_URL = './cartoon.glb';
        
        let cvReady = false;
        let videoElement, canvasCtx, videoCanvas;
        let scene, camera, renderer, model = null;
        let orb, referenceDescriptors, referenceKeypoints, referenceImageGray;
        let goodMatchesCount = 0;
        let arActive = false;
        
        const statusDiv = document.getElementById('status');
        
        // 全局回调，供 opencv.js 调用
        window.onOpenCvReady = function() {
            cvReady = true;
            statusDiv.innerText = '✅ OpenCV就绪，加载参考图...';
            loadReferenceImage();
        };
        
        function loadReferenceImage() {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.src = REF_IMAGE_URL;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const imgData = ctx.getImageData(0, 0, img.width, img.height);
                const mat = cv.matFromImageData(imgData);
                referenceImageGray = new cv.Mat();
                cv.cvtColor(mat, referenceImageGray, cv.COLOR_RGBA2GRAY);
                orb = new cv.ORB.create();
                const keypointsVec = new cv.KeyPointVector();
                const descriptors = new cv.Mat();
                orb.detectAndCompute(referenceImageGray, new cv.Mat(), keypointsVec, descriptors);
                referenceKeypoints = keypointsVec;
                referenceDescriptors = descriptors;
                mat.delete();
                statusDiv.innerText = `📷 参考图就绪 (特征点 ${referenceKeypoints.size()}), 加载模型...`;
                loadModel();
            };
            img.onerror = () => {
                statusDiv.innerText = '❌ 参考图加载失败，请确保logo.jpg存在';
            };
        }
        
        function loadModel() {
            const loader = new GLTFLoader();
            loader.load(MODEL_URL, (gltf) => {
                model = gltf.scene;
                statusDiv.innerText = '🎉 模型加载成功，启动摄像头...';
                startCamera();
            }, (xhr) => {
                // 可选进度
            }, (error) => {
                statusDiv.innerText = '❌ 模型加载失败: ' + error.message;
            });
        }
        
        function startCamera() {
            videoElement = document.createElement('video');
            videoElement.setAttribute('autoplay', '');
            videoElement.setAttribute('playsinline', '');
            videoElement.style.width = '100%';
            videoElement.style.height = '100%';
            videoElement.style.objectFit = 'cover';
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => {
                    videoElement.srcObject = stream;
                    videoElement.play();
                    videoElement.addEventListener('loadeddata', () => {
                        initThree();
                        requestAnimationFrame(processFrame);
                        arActive = true;
                    });
                })
                .catch(err => {
                    statusDiv.innerText = '❌ 无法访问摄像头，请授权';
                });
        }
        
        function initThree() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            scene = new THREE.Scene();
            scene.background = null;
            camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
            camera.position.set(0, 0, 2.2);
            renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(width, height);
            renderer.setClearColor(0x000000, 0);
            document.body.appendChild(renderer.domElement);
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0px';
            renderer.domElement.style.left = '0px';
            renderer.domElement.style.zIndex = '1';
            
            videoCanvas = document.createElement('canvas');
            videoCanvas.style.position = 'absolute';
            videoCanvas.style.top = '0px';
            videoCanvas.style.left = '0px';
            videoCanvas.style.width = '100%';
            videoCanvas.style.height = '100%';
            videoCanvas.style.objectFit = 'cover';
            videoCanvas.style.zIndex = '0';
            document.body.appendChild(videoCanvas);
            canvasCtx = videoCanvas.getContext('2d');
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x88aaff, 0.5);
            fillLight.position.set(0, 1, -1);
            scene.add(fillLight);
            
            if (model) scene.add(model);
        }
        
        function captureFrame() {
            const width = videoElement.videoWidth;
            const height = videoElement.videoHeight;
            const scale = Math.min(640 / width, 480 / height);
            const dstWidth = Math.floor(width * scale);
            const dstHeight = Math.floor(height * scale);
            const canvas = document.createElement('canvas');
            canvas.width = dstWidth;
            canvas.height = dstHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, dstWidth, dstHeight);
            const imgData = ctx.getImageData(0, 0, dstWidth, dstHeight);
            const mat = cv.matFromImageData(imgData);
            return mat;
        }
        
        function detectAndCompute(frameMat) {
            if (!referenceDescriptors || referenceKeypoints.size() === 0) return null;
            let gray = new cv.Mat();
            cv.cvtColor(frameMat, gray, cv.COLOR_RGBA2GRAY);
            let kpFrame = new cv.KeyPointVector();
            let desFrame = new cv.Mat();
            orb.detectAndCompute(gray, new cv.Mat(), kpFrame, desFrame);
            if (desFrame.rows < 2) {
                gray.delete(); desFrame.delete(); kpFrame.delete();
                return null;
            }
            let matcher = new cv.FlannBasedMatcher();
            let knnMatches = new cv.DMatchVectorVector();
            matcher.knnMatch(referenceDescriptors, desFrame, knnMatches, 2);
            let goodMatches = [];
            for (let i = 0; i < knnMatches.size(); i++) {
                let matches = knnMatches.get(i);
                if (matches.size() === 2) {
                    let m1 = matches.get(0);
                    let m2 = matches.get(1);
                    if (m1.distance < 0.7 * m2.distance) goodMatches.push(m1);
                }
            }
            goodMatchesCount = goodMatches.length;
            if (goodMatches.length < 12) {
                gray.delete(); desFrame.delete(); kpFrame.delete(); matcher.delete(); knnMatches.delete();
                return null;
            }
            let srcPoints = [], dstPoints = [];
            for (let i = 0; i < goodMatches.length; i++) {
                let m = goodMatches[i];
                let kpRef = referenceKeypoints.get(m.queryIdx);
                let kpScene = kpFrame.get(m.trainIdx);
                srcPoints.push([kpRef.pt.x, kpRef.pt.y]);
                dstPoints.push([kpScene.pt.x, kpScene.pt.y]);
            }
            let srcMat = cv.matFromArray(srcPoints.length, 1, cv.CV_32FC2, srcPoints.flat());
            let dstMat = cv.matFromArray(dstPoints.length, 1, cv.CV_32FC2, dstPoints.flat());
            let homography = cv.findHomography(srcMat, dstMat, cv.RANSAC, 5.0);
            if (homography.empty()) {
                srcMat.delete(); dstMat.delete(); homography.delete();
                gray.delete(); desFrame.delete(); kpFrame.delete(); matcher.delete(); knnMatches.delete();
                return null;
            }
            let h = referenceImageGray.rows, w = referenceImageGray.cols;
            let corners = [[0,0],[w,0],[w,h],[0,h]];
            let cornersMat = cv.matFromArray(4,1,cv.CV_32FC2, corners.flat());
            let transformedCorners = new cv.Mat();
            cv.perspectiveTransform(cornersMat, transformedCorners, homography);
            let imagePoints = [];
            for (let i=0; i<transformedCorners.rows; i++) {
                let x = transformedCorners.data32F[i*2];
                let y = transformedCorners.data32F[i*2+1];
                imagePoints.push([x,y]);
            }
            let imagePointsMat = cv.matFromArray(4,1,cv.CV_32FC2, imagePoints.flat());
            const w_real = 0.05, h_real = 0.03;
            let objectPoints = [[0,0,0],[w_real,0,0],[w_real,h_real,0],[0,h_real,0]];
            let objectPointsMat = cv.matFromArray(4,1,cv.CV_32FC3, objectPoints.flat());
            let fx=800, fy=800, cx=frameMat.cols/2, cy=frameMat.rows/2;
            let cameraMat = cv.matFromArray(3,3,cv.CV_64F, [fx,0,cx,0,fy,cy,0,0,1]);
            let distCoeffs = cv.Mat.zeros(4,1,cv.CV_64F);
            let rvec = new cv.Mat(), tvec = new cv.Mat();
            let success = cv.solvePnP(objectPointsMat, imagePointsMat, cameraMat, distCoeffs, rvec, tvec, false, cv.SOLVEPNP_ITERATIVE);
            let result = null;
            if (success) {
                let rvecData = [rvec.data64F[0], rvec.data64F[1], rvec.data64F[2]];
                let tvecData = [tvec.data64F[0], tvec.data64F[1], tvec.data64F[2]];
                result = { rx: rvecData[0], ry: rvecData[1], rz: rvecData[2], tx: tvecData[0], ty: tvecData[1], tz: tvecData[2] };
            }
            srcMat.delete(); dstMat.delete(); homography.delete(); cornersMat.delete(); transformedCorners.delete();
            imagePointsMat.delete(); objectPointsMat.delete(); cameraMat.delete(); distCoeffs.delete();
            rvec.delete(); tvec.delete();
            gray.delete(); desFrame.delete(); kpFrame.delete(); matcher.delete(); knnMatches.delete();
            return result;
        }
        
        async function processFrame() {
            if (!arActive || !videoElement || !videoElement.videoWidth || !canvasCtx || !model || !referenceImageGray) {
                requestAnimationFrame(processFrame);
                return;
            }
            canvasCtx.drawImage(videoElement, 0, 0, videoCanvas.width, videoCanvas.height);
            const frameMat = captureFrame();
            if (frameMat) {
                const pose = detectAndCompute(frameMat);
                if (pose) {
                    model.position.set(pose.tx, -pose.ty, -pose.tz);
                    model.rotation.set(pose.rx, -pose.ry, -pose.rz);
                    statusDiv.innerText = `🎯 跟踪中 | 匹配点: ${goodMatchesCount}`;
                } else {
                    statusDiv.innerText = `🔍 未识别到 Logo | 匹配点: ${goodMatchesCount}`;
                }
                frameMat.delete();
            }
            renderer.render(scene, camera);
            requestAnimationFrame(processFrame);
        }
        
        window.addEventListener('resize', () => {
            if (renderer && camera) {
                const w = window.innerWidth, h = window.innerHeight;
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                if (videoCanvas) { videoCanvas.style.width = w+'px'; videoCanvas.style.height = h+'px'; }
            }
        });
    </script>
</head>
<body>
    <div id="status">⏳ 加载中，请稍候...</div>
    <div id="info">🔬 完全自研AR | 无需App | 扫瓶身Logo即现3D人物</div>
    <div class="instruction">📱 对准瓶身Logo，3D人物将实时跟随</div>
</body>
</html>
